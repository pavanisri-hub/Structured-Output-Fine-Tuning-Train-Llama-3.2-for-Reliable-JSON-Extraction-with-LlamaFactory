services:
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mtl-pcgrad-dashboard
    env_file:
      - .env
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    volumes:
      - ./:/app
    command: streamlit run app.py --server.address=0.0.0.0 --server.port=8501
    restart: unless-stopped
